name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check
        run: |
          python -m py_compile menu_bingo.py
          python -m py_compile src/exportify_to_txt.py
          python -m py_compile src/generador_csv_cartones.py
          python -m py_compile src/simulador_partidas.py
          python -m py_compile src/menu_interactivo.py

      - name: Run tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v
